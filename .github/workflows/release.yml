name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (major, minor, patch)'
        required: false
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
      publish_tag:
        description: 'Existing tag to publish instead of bumping, e.g. v0.2.0'
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # Required for trusted publishing

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag == ''
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          uv run bump-my-version bump ${{ github.event.inputs.version_bump }}

      - name: Capture bumped tag
        id: version
        run: |
          echo "tag=v$(uv run bump-my-version show current_version)" >> "$GITHUB_OUTPUT"

      - name: Push changes
        run: |
          git push origin main
          git push origin --tags

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    needs: bump-version
    if: always() && (github.event_name == 'push' || github.event.inputs.publish_tag != '' || needs.bump-version.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.publish_tag || needs.bump-version.outputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - bump-version
      - publish
    if: always() && needs.publish.result == 'success'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.publish_tag || needs.bump-version.outputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.publish_tag || needs.bump-version.outputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
