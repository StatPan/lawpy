name: API Spec & Drift Detection

on:
  schedule:
    # 매일 09:00 KST (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_rescrape:
        description: 'Force full re-scrape even if no count change'
        type: boolean
        default: false

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Detect if API guide changed
  # ──────────────────────────────────────────────
  spec-check:
    name: Check spec and API drift
    runs-on: ubuntu-latest
    outputs:
      spec_changed: ${{ steps.spec-diff.outputs.changed }}
      drift_detected: ${{ steps.probe-diff.outputs.drift }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      # ── 1a. Quick API count check ──────────────
      - name: Scrape current spec list (quick)
        run: |
          uv run python scripts/scrape_specs.py \
            --output /tmp/specs_new \
            --delay 0.2

      # ── 1b. Diff new vs committed specs ────────
      - name: Diff specs
        id: spec-diff
        run: |
          uv run python scripts/spec_diff.py \
            --old specs/kr/ \
            --new /tmp/specs_new/ \
            --output-json /tmp/spec_diff_result.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Show spec diff summary
        run: cat /tmp/spec_diff_result.json | python3 -m json.tool || true

      # ── 1c. Live API probe diff ────────────────
      - name: Run probe diff (live API vs snapshots)
        id: probe-diff
        env:
          LAWPY_API_KEY: ${{ secrets.LAWPY_API_KEY }}
        run: |
          uv run lawpy-probe diff --all --output json > /tmp/probe_drift.json \
            && echo "drift=false" >> $GITHUB_OUTPUT \
            || echo "drift=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detection-reports-${{ github.run_id }}
          path: |
            /tmp/spec_diff_result.json
            /tmp/probe_drift.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Step 2: If changed → re-scrape + codegen + PR
  # ──────────────────────────────────────────────
  update-and-pr:
    name: Re-scrape and regenerate code
    needs: spec-check
    if: needs.spec-check.outputs.spec_changed == 'true' || github.event.inputs.force_rescrape == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Full re-scrape
        run: |
          uv run python scripts/scrape_specs.py \
            --output specs/kr/ \
            --delay 0.2

      - name: Regenerate client stubs
        run: |
          uv run python scripts/codegen.py \
            --specs specs/kr/ \
            --out src/lawpy/kr/generated/

      - name: Update probe snapshots
        env:
          LAWPY_API_KEY: ${{ secrets.LAWPY_API_KEY }}
        run: |
          uv run lawpy-probe capture --all || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/auto-spec-update-${{ github.run_id }}
          title: '🔄 Auto: API spec update detected'
          body: |
            ## Automated API Spec Update

            The daily spec check detected changes in the Korean Law OpenAPI guide.

            ### What changed
            See attached `spec_diff_result.json` in the Actions run artifacts.

            ### Changes in this PR
            - Updated `specs/kr/*.json` (re-scraped from open.law.go.kr)
            - Regenerated `src/lawpy/kr/generated/*.py` stubs
            - Updated `src/lawpy/snapshots/*.json` probe snapshots

            ### Review checklist
            - [ ] Check `spec_diff_result.json` for breaking changes (removed params/fields)
            - [ ] Update hand-written parsers in `src/lawpy/kr/law.py`, `precedent.py` etc. if needed
            - [ ] Run tests: `uv run pytest`
            - [ ] Bump version if breaking changes
          labels: |
            api-spec-update
            automated-pr

  # ──────────────────────────────────────────────
  # Step 3: If live API drifted → create issue
  # ──────────────────────────────────────────────
  notify-drift:
    name: Notify on API drift
    needs: spec-check
    if: needs.spec-check.outputs.drift_detected == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: detection-reports-${{ github.run_id }}
          path: /tmp/

      - name: Create or update GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let probe = '{}';
            try { probe = fs.readFileSync('/tmp/probe_drift.json', 'utf8'); } catch(e) {}

            const parsed = JSON.parse(probe);
            const breaking = Array.isArray(parsed)
              ? parsed.filter(r => r.has_breaking_changes)
              : [];

            const body = [
              '## 🚨 Live API Response Drift Detected',
              `Detected on: ${new Date().toISOString()}`,
              '',
              '### Breaking Changes (fields removed from API responses)',
              '```json',
              JSON.stringify(breaking, null, 2),
              '```',
              '',
              '### Action Required',
              '1. Run locally: `LAWPY_API_KEY=your_key lawpy-probe diff --all`',
              '2. Fix parsers in `src/lawpy/kr/` to match new schema',
              '3. Run `lawpy-probe capture --all` to update snapshots',
              '4. Commit + release',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-drift',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `## 🔁 Drift still present (${new Date().toISOString()})\n\n` + body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Live API Response Drift Detected',
                body,
                labels: ['api-drift', 'bug'],
              });
            }
