name: API Spec & Drift Detection

on:
  schedule:
    # Daily at 09:00 KST (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_rescrape:
        description: 'Force full re-scrape + codegen even if no spec change'
        type: boolean
        default: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Detect spec changes and live API drift
  # ──────────────────────────────────────────────
  spec-check:
    name: Detect spec and drift changes
    runs-on: ubuntu-latest
    outputs:
      spec_changed: ${{ steps.spec-diff.outputs.changed }}
      snapshot_verify_failed: ${{ steps.probe-verify.outputs.failed }}
      drift_detected: ${{ steps.probe-diff.outputs.drift }}
      probe_failed: ${{ steps.probe-diff.outputs.probe_failed }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      # 1a. Re-scrape guide list from open.law.go.kr
      - name: Scrape current API specs
        run: |
          uv run python scripts/scrape_specs.py \
            --output /tmp/specs_new \
            --delay 0.2

      # 1b. Diff new specs vs committed specs/kr/
      - name: Diff specs
        id: spec-diff
        run: |
          uv run python scripts/spec_diff.py \
            --old specs/kr/ \
            --new /tmp/specs_new/ \
            --output-json /tmp/spec_diff_result.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Show spec diff summary
        run: cat /tmp/spec_diff_result.json | python3 -m json.tool || true

      # 1c. Snapshot vs generated model verification (no live API call)
      - name: Run probe snapshot verify
        id: probe-verify
        run: |
          if uv run lawpy-probe verify --all --output json > /tmp/probe_verify.json; then
            echo "failed=false" >> $GITHUB_OUTPUT
          else
            echo "failed=true" >> $GITHUB_OUTPUT
          fi

      # 1d. Live API probe diff (response schema vs snapshots)
      - name: Run probe diff
        id: probe-diff
        env:
          LAWPY_KR_API_KEY: ${{ secrets.LAWPY_KR_API_KEY }}
        run: |
          set +e
          uv run lawpy-probe --output json diff --all > /tmp/probe_drift.json
          probe_exit=$?
          set -e

          PROBE_EXIT="$probe_exit" node <<'NODE'
          const fs = require('fs');
          const output = process.env.GITHUB_OUTPUT;
          const probeExit = Number(process.env.PROBE_EXIT || '0');
          let parsed = [];
          let parseFailed = false;

          try {
            const raw = fs.readFileSync('/tmp/probe_drift.json', 'utf8').trim();
            if (raw) parsed = JSON.parse(raw);
          } catch (e) {
            parseFailed = true;
            console.warn(`Could not parse probe_drift.json: ${e.message}`);
          }

          const rows = Array.isArray(parsed) ? parsed : [];
          const hasBreaking = rows.some((row) => row && row.has_breaking_changes === true);
          const hasProbeError = rows.some((row) => row && (row.status === 'error' || row.error));
          const probeFailed = parseFailed || hasProbeError || (probeExit !== 0 && !hasBreaking);

          fs.appendFileSync(output, `drift=${hasBreaking}\n`);
          fs.appendFileSync(output, `probe_failed=${probeFailed}\n`);
          NODE

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detection-reports-${{ github.run_id }}
          path: |
            /tmp/spec_diff_result.json
            /tmp/probe_verify.json
            /tmp/probe_drift.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 1b: Fail visibly on detection infrastructure errors
  # ──────────────────────────────────────────────
  detection-health:
    name: Detection health gate
    needs: spec-check
    if: always() && (needs.spec-check.outputs.snapshot_verify_failed == 'true' || needs.spec-check.outputs.probe_failed == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Report detection infrastructure failure
        run: |
          if [ "${{ needs.spec-check.outputs.snapshot_verify_failed }}" = "true" ]; then
            echo "Snapshot/model verification failed; inspect the detection report artifact."
          fi
          if [ "${{ needs.spec-check.outputs.probe_failed }}" = "true" ]; then
            echo "Live API probe failed before a breaking drift decision; inspect the detection report artifact."
          fi
          exit 1

  # ──────────────────────────────────────────────
  # Job 2: If specs changed → full pipeline + PR
  # ──────────────────────────────────────────────
  update-and-pr:
    name: Re-scrape, discover root keys, regenerate code
    needs: spec-check
    if: needs.spec-check.outputs.spec_changed == 'true' || github.event.inputs.force_rescrape == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      # Step 1: Re-scrape all 195 API spec pages
      - name: Full re-scrape specs
        run: |
          uv run python scripts/scrape_specs.py \
            --output specs/kr/ \
            --delay 0.2

      # Step 2: Re-discover JSON root/item keys from live API
      - name: Discover root keys
        env:
          LAWPY_KR_API_KEY: ${{ secrets.LAWPY_KR_API_KEY }}
        run: |
          uv run python scripts/probe_root_keys.py \
            --specs specs/kr/ \
            --delay 0.3

      # Step 3: Regenerate all client stubs from specs + root keys
      - name: Regenerate client stubs
        run: |
          uv run python scripts/codegen.py \
            --specs specs/kr/ \
            --out src/lawpy/kr/generated/

      # Step 4: Refresh probe snapshots
      - name: Update probe snapshots
        env:
          LAWPY_KR_API_KEY: ${{ secrets.LAWPY_KR_API_KEY }}
        run: |
          uv run lawpy-probe capture --all || true

      # Step 5: Run tests to catch regressions
      - name: Run tests
        run: uv run pytest tests/ -q --no-header --tb=short

      - name: Drop dependency lock metadata churn
        run: git restore --source=HEAD -- uv.lock || true

      # Step 6: Open a PR with all changes
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/auto-spec-update-${{ github.run_id }}
          commit-message: 'chore: auto-update specs + regenerate clients [bot]'
          title: '🔄 Auto: API spec change detected'
          body: |
            ## Automated API Spec Update

            The daily check detected changes in the Korean Law OpenAPI guide pages.

            ### Pipeline executed
            1. ✅ Re-scraped `specs/kr/` from `open.law.go.kr`
            2. ✅ Re-discovered JSON root/item keys (`specs/kr/_root_keys.json`)
            3. ✅ Regenerated `src/lawpy/kr/generated/*.py` client stubs
            4. ✅ Updated `src/lawpy/snapshots/*.json` probe snapshots
            5. ✅ Tests passed

            ### Review checklist
            - [ ] Review `spec_diff_result.json` artifact for breaking changes (removed params/fields)
            - [ ] Update hand-written parsers in `src/lawpy/kr/law.py`, `precedent.py` if needed
            - [ ] Bump version if there are breaking changes
          labels: |
            api-spec-update
            automated-pr

  # ──────────────────────────────────────────────
  # Job 3: If live responses drifted → open issue
  # ──────────────────────────────────────────────
  notify-drift:
    name: Notify on live API response drift
    needs: spec-check
    if: needs.spec-check.outputs.drift_detected == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: detection-reports-${{ github.run_id }}
          path: /tmp/

      - name: Create or update GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let parsed = [];
            try {
              const raw = fs.readFileSync('/tmp/probe_drift.json', 'utf8').trim();
              if (raw) parsed = JSON.parse(raw);
            } catch(e) {
              core.warning(`Could not parse probe_drift.json: ${e.message}`);
            }

            const breaking = Array.isArray(parsed)
              ? parsed.filter(r => r.has_breaking_changes)
              : [];

            const body = [
              '## 🚨 Live API Response Drift Detected',
              `Detected: ${new Date().toISOString()}`,
              '',
              '### Breaking Changes (fields removed from live API responses)',
              '```json',
              JSON.stringify(breaking, null, 2),
              '```',
              '',
              '### Action Required',
              '1. Run locally: `LAWPY_KR_API_KEY=<key> lawpy-probe diff --all`',
              '2. Fix parsers in `src/lawpy/kr/` to match new schema',
              '3. Run `lawpy-probe capture --all` to update snapshots',
              '4. Run `scripts/codegen.py` if generated stubs are affected',
              '5. Commit + release new version',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-drift',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `## 🔁 Drift still present (${new Date().toISOString()})\n\n` + body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Live API Response Drift Detected',
                body,
                labels: ['api-drift', 'bug'],
              });
            }
